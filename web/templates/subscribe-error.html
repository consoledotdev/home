<!DOCTYPE html>
<html lang="en" class="h-screen">
  {{template "head" "Subscribe error - console.dev"}}
  <body class="bg-black text-white">
    {{template "header"}}
    <main>
      <div class="container mx-auto max-w-7xl px-4 lg:px-8 py-8">
        <h1 class="text-3xl lg:text-4xl">{{.Heading}}</h1>

        <p class="text-lg lg:text-xl text-gray-300 mt-4">
          {{.Message}}
        </p>

        <p class="mt-6">
          <a href="/" class="underline hover:text-gray-300">Go to the homepage.</a>
        </p>
      </div>
    </main>
    {{template "footer"}}
  </body>
</html>
